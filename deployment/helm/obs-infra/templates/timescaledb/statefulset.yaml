# StatefulSet: pod "timescaledb-0" always reattaches to PVC "data-timescaledb-0",
# so data survives pod restarts and rescheduling.
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: timescaledb
  namespace: {{ .Values.namespace }}
spec:
  serviceName: timescaledb
  replicas: 1
  selector:
    matchLabels:
      app: timescaledb
  template:
    metadata:
      labels:
        app: timescaledb
    spec:
      containers:
        - name: timescaledb
          image: {{ .Values.timescaledb.image }}
          ports:
            - containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: obs_user
            - name: POSTGRES_PASSWORD
              value: obs_password
            - name: POSTGRES_DB
              value: obs_pipeline
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "obs_user", "-d", "obs_pipeline"]
            initialDelaySeconds: 10
            periodSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: ["pg_isready", "-U", "obs_user", "-d", "obs_pipeline"]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: [ReadWriteOnce]
        resources:
          requests:
            storage: {{ .Values.timescaledb.storage }}