apiVersion: v1
kind: ConfigMap
metadata:
  name: obs-config
  namespace: {{ .Values.namespace }}
data:
  KAFKA_BROKERS: "obs-kafka:9092"
  TOPIC_RAW:      "events.raw"
  TOPIC_ENRICHED: "events.enriched"
  TOPIC_DLQ:      "events.dlq"
  TOPIC_ALERTS:   "events.alerts"

  # ── Redis ──────────────────────────────────────────────────────────────────
  REDIS_URL: "redis://redis:6379"

  # ── App server settings ────────────────────────────────────────────────────
  GIN_MODE:     "release"
  HTTP_ADDR:    ":8080"
  METRICS_ADDR: ":9090"
  METRICS_PORT: "9091"
  HTTP_PORT:    "4000"

  # ── File paths (must match where Dockerfiles COPY the files) ──────────────
  SCHEMA_PATH:           "/app/schema.json"
  GEOIP_DB_PATH:         "/app/GeoLite2-City.mmdb"
  SERVICE_REGISTRY_PATH: "/app/service-registry.json"

  # ── Detector tuning (all have sensible defaults in config.py) ─────────────
  WINDOW_SECONDS:         "60"
  ERROR_RATE_THRESHOLD:   "0.10"
  ERROR_RATE_MIN_EVENTS:  "10"
  ZSCORE_THRESHOLD:       "3.0"
  ZSCORE_MIN_WINDOWS:     "5"
  ZSCORE_BASELINE_SIZE:   "10"
  ALERT_COOLDOWN_MINUTES: "5"
