# One ServiceAccount per service.
# These pods don't call the K8s API — no Role or RoleBinding needed.
# The ServiceAccount is the pod's identity: on managed clouds (EKS/AKS/GKE),
# annotating it with a cloud IAM role grants the pod access to cloud services
# (S3, Azure Blob, GCS) without hardcoding credentials.
{{- range list "ingestor" "enricher" "detector" "query-api" "dashboard" }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ . }}-sa
  namespace: {{ $.Values.namespace }}
  labels:
    {{- include "obs.labels" $ | nindent 4 }}
# Disable automatic API token mount — these pods don't call the K8s API.
# Mounting the token is unnecessary attack surface.
automountServiceAccountToken: false
{{- end }}