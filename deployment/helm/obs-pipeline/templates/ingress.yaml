# /api/* → ingestor:8080 (strips /api prefix via rewrite-target /$2)
# /*     → dashboard:3000 (catch-all)
# GraphQL goes through dashboard nginx.conf → query-api:4000 internally.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: obs-ingress
  namespace: {{ .Values.namespace }}
  annotations:
    # use-regex: "true" tells nginx to treat path patterns as regular expressions.
    # Without this, /api(/|$)(.*) is matched as a literal string, not a regex —
    # requests to /api/v1/events would fall through to the dashboard catch-all.
    nginx.ingress.kubernetes.io/use-regex: "true"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    # rewrite-target: strips the /api prefix before forwarding to the ingestor.
    # $2 = second capture group in /api(/|$)(.*) = everything after /api.
    # /api/v1/events → ingestor:8080/v1/events
    # /api/healthz   → ingestor:8080/healthz
    nginx.ingress.kubernetes.io/rewrite-target: /$2
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /api(/|$)(.*)
            pathType: ImplementationSpecific
            backend:
              service:
                name: ingestor
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: dashboard
                port:
                  number: 3000