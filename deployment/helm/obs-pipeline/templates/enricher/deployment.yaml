apiVersion: apps/v1
kind: Deployment
metadata:
  name: enricher
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.enricher.replicas }}
  selector:
    matchLabels:
      app: enricher
  template:
    metadata:
      labels:
        app: enricher
    spec:
      serviceAccountName: enricher-sa
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z obs-kafka 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-schema
          # Uses timescaledb image because it bundles psql — no extra image needed.
          # Image version controlled via .Values.initImages.waitForSchema in values.yaml.
          image: {{ .Values.initImages.waitForSchema }}
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c "\dt events" 2>/dev/null | grep -q events; do
                echo "waiting for DB schema..."; sleep 3
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL
      containers:
        - name: enricher
          image: {{ include "obs.image" (dict "name" "enricher" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 9090
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL
            - name: KAFKA_GROUP_ID
              value: "enricher-v1"
          livenessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9090
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.enricher.resources | nindent 12 }}