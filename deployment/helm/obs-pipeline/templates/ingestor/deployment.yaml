apiVersion: apps/v1
kind: Deployment
metadata:
  name: ingestor
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.ingestor.replicas }}
  selector:
    matchLabels:
      app: ingestor
  template:
    metadata:
      labels:
        app: ingestor
    spec:
      serviceAccountName: ingestor-sa
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z obs-kafka 9092; do echo waiting for kafka; sleep 2; done']
      containers:
        - name: ingestor
          image: {{ include "obs.image" (dict "name" "ingestor" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 8080
          envFrom:
            - configMapRef:
                name: obs-config
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.ingestor.resources | nindent 12 }}