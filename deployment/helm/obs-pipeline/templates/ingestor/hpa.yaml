{{- if .Values.hpa.enabled }}
# HPA reads CPU metrics from metrics-server and adjusts Deployment replicas.
# autoscaling/v2 supports CPU + memory + custom metrics (v1 was CPU-only).
# Scale-up: checks every 15s, scales immediately when CPU > cpuTarget%.
# Scale-down: 5-min stabilization window prevents flapping.
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ingestor-hpa
  namespace: {{ .Values.namespace }}
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ingestor
  minReplicas: {{ .Values.hpa.ingestor.minReplicas }}
  maxReplicas: {{ .Values.hpa.ingestor.maxReplicas }}
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: {{ .Values.hpa.ingestor.cpuTarget }}
{{- end }}