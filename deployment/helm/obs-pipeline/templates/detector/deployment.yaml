apiVersion: apps/v1
kind: Deployment
metadata:
  name: detector
  namespace: {{ .Values.namespace }}
spec:
  replicas: {{ .Values.detector.replicas }}
  selector:
    matchLabels:
      app: detector
  template:
    metadata:
      labels:
        app: detector
    spec:
      serviceAccountName: detector-sa
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z obs-kafka 9092; do echo waiting for kafka; sleep 2; done']
        - name: wait-for-schema
          image: {{ .Values.initImages.waitForSchema }}
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c "\dt events" 2>/dev/null | grep -q events; do
                echo "waiting for DB schema..."; sleep 3
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL
        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']
      containers:
        - name: detector
          image: {{ include "obs.image" (dict "name" "detector" "root" .) }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: 9091
          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL
            - name: KAFKA_GROUP_ID
              value: "detector-v1"
            - name: WEBHOOK_URL
              value: ""
          livenessProbe:
            tcpSocket:
              port: 9091
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 9091
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            {{- toYaml .Values.detector.resources | nindent 12 }}