# SECRET — sensitive configuration (credentials, connection strings with passwords)
#
# What is a Secret?
#   Like a ConfigMap, but k8s:
#     1. Stores values base64-encoded at rest (NOT fully encrypted by default)
#     2. Restricts access via RBAC (Role-Based Access Control)
#     3. Avoids printing values in `kubectl describe`
#
# stringData vs data:
#   data:       values must be manually base64-encoded (echo -n "value" | base64)
#   stringData: plain text — k8s base64-encodes them automatically on apply
#   We use stringData here for readability.
#
# ⚠ IMPORTANT — this file contains a password in plain text.
#   In a real project you would:
#     1. Add this file to .gitignore (never commit secrets)
#     2. Use a secrets manager: HashiCorp Vault, AWS Secrets Manager, Azure Key Vault
#     3. Or use Sealed Secrets / External Secrets Operator for GitOps workflows
#   For this learning project, plain text is fine.
#
# Usage in a Deployment:
#   env:
#     - name: DATABASE_URL
#       valueFrom:
#         secretKeyRef:
#           name: obs-secrets
#           key: DATABASE_URL
apiVersion: v1
kind: Secret
metadata:
  name: obs-secrets
  namespace: obs-pipeline
type: Opaque
stringData:
  # "timescaledb" = the ClusterIP service name (k8s/infra/timescaledb/service.yaml).
  # Credentials match POSTGRES_USER / POSTGRES_PASSWORD in the StatefulSet.
  DATABASE_URL: "postgres://obs_user:obs_password@timescaledb:5432/obs_pipeline"
  POSTGRES_PASSWORD: "obs_password"
