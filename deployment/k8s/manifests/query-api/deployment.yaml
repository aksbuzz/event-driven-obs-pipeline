# DEPLOYMENT — Query-API (Node/Fastify/Mercurius GraphQL)
#
# Query-API serves HTTP — uses httpGet probe on /healthz instead of tcpSocket.
# This is a stronger health check: it verifies the HTTP server is responding
# to requests, not just that the port is open.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: query-api
  namespace: obs-pipeline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: query-api
  template:
    metadata:
      labels:
        app: query-api
    spec:
      initContainers:
        - name: wait-for-kafka
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z obs-kafka 9092; do echo waiting for kafka; sleep 2; done']

        - name: wait-for-schema
          image: timescale/timescaledb:latest-pg17
          command:
            - sh
            - -c
            - |
              until psql "$DATABASE_URL" -c "\dt events" 2>/dev/null | grep -q events; do
                echo "waiting for DB schema..."; sleep 3
              done
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL

        - name: wait-for-redis
          image: busybox:1.36
          command: ['sh', '-c', 'until nc -z redis 6379; do echo waiting for redis; sleep 2; done']

      containers:
        - name: query-api
          image: obs-query-api:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4000  # GraphQL API
            - containerPort: 4001  # Prometheus metrics

          envFrom:
            - configMapRef:
                name: obs-config
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: obs-secrets
                  key: DATABASE_URL
            - name: KAFKA_GROUP_ID
              value: "query-api-v1"

          livenessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 15
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /healthz
              port: 4000
            initialDelaySeconds: 5
            periodSeconds: 5

          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
