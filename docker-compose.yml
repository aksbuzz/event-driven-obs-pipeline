services:
  kafka:
    image: confluentinc/cp-kafka:8.2.0
    container_name: obs-kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: 'CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT'
      KAFKA_ADVERTISED_LISTENERS: 'PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092'
      KAFKA_PROCESS_ROLES: 'broker,controller'
      KAFKA_CONTROLLER_QUORUM_VOTERS: '1@kafka:29093'
      KAFKA_LISTENERS: 'PLAINTEXT://kafka:29092,CONTROLLER://kafka:29093,PLAINTEXT_HOST://0.0.0.0:9092'
      KAFKA_INTER_BROKER_LISTENER_NAME: 'PLAINTEXT'
      KAFKA_CONTROLLER_LISTENER_NAMES: 'CONTROLLER'
      CLUSTER_ID: 'MkU3OEVBNTcwNTJENDM2Qk'
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    volumes:
      - kafka_data:/var/lib/kafka/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD", "kafka-topics", "--bootstrap-server", "kafka:29092", "--list"]
      interval: 10s
      timeout: 5s
      retries: 10

  timescaledb:
    image: timescale/timescaledb:latest-pg17
    container_name: obs-timescaledb
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=obs_user
      - POSTGRES_PASSWORD=obs_password
      - POSTGRES_DB=obs_pipeline
    volumes:
      - timescale_data:/var/lib/postgresql/data
    networks:
      - obs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U obs_user -d obs_pipeline"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:8.6-alpine
    container_name: obs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - obs-network

  ingestor:
    build:
      context: .
      dockerfile: services/ingestor/Dockerfile
    container_name: obs-ingestor
    ports:
      - "8080:8080"   # HTTP API
      - "8081:8081"   # Prometheus metrics (if you split it later)
    environment:
      HTTP_ADDR: ":8080"
      KAFKA_BROKERS: "kafka:29092"    # internal Docker network — NOT localhost:9092
      TOPIC_RAW: "events.raw"
      TOPIC_DLQ: "events.dlq"
      SCHEMA_PATH: "/app/schema.json"
    volumes:
      - ./libs/event-schema/schema.json:/app/schema.json:ro
    depends_on:
      kafka:
        condition: service_healthy
    networks:
      - obs-network
    restart: unless-stopped

  enricher:
    build:
      context: .
      dockerfile: services/enricher/Dockerfile
    container_name: obs-enricher
    ports:
      - "9090:9090"   # Prometheus metrics
    environment:
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "enricher-v1"
      TOPIC_RAW: "events.raw"
      TOPIC_ENRICHED: "events.enriched"
      TOPIC_DLQ: "events.dlq"
      DATABASE_URL: "postgres://obs_user:obs_password@timescaledb:5432/obs_pipeline"
      SERVICE_REGISTRY_PATH: "/app/service-registry.json"
      GEOIP_DB_PATH: "/app/GeoLite2-City.mmdb"
      METRICS_ADDR: ":9090"
    volumes:
      - ./libs/event-schema/service-registry.json:/app/service-registry.json:ro
      - ./infra/geoip/GeoLite2-City.mmdb:/app/GeoLite2-City.mmdb:ro
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - obs-network
    restart: unless-stopped

  detector:
    build:
      context: ./services/detector
      dockerfile: Dockerfile
    ports:
      - "9091:9091"   # Prometheus metrics
    environment:
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "detector-v1"
      TOPIC_ENRICHED: "events.enriched"
      TOPIC_ALERTS: "events.alerts"
      DATABASE_URL: "postgres://obs_user:obs_password@timescaledb:5432/obs_pipeline"
      REDIS_URL: "redis://redis:6379"
      WEBHOOK_URL: ""
      WINDOW_SECONDS: "60"
      ERROR_RATE_THRESHOLD: "0.10"
      ERROR_RATE_MIN_EVENTS: "10"
      ZSCORE_THRESHOLD: "3.0"
      ZSCORE_MIN_WINDOWS: "5"
      ZSCORE_BASELINE_SIZE: "10"
      ALERT_COOLDOWN_MINUTES: "5"
      METRICS_PORT: "9091"
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
      redis:
        condition: service_started
    networks:
      - obs-network
    restart: unless-stopped

  query-api:
    build:
      context: services/query-api
    container_name: obs-query-api
    ports:
      - "4000:4000"
      - "4001:4001"
    environment:
      DATABASE_URL: "postgres://obs_user:obs_password@timescaledb:5432/obs_pipeline"
      KAFKA_BROKERS: "kafka:29092"
      KAFKA_GROUP_ID: "query-api-v1"
      TOPIC_ENRICHED: "events.enriched"
      HTTP_PORT: "4000"
      METRICS_PORT: "4001"
    depends_on:
      kafka:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - obs-network
    restart: unless-stopped

  dashboard:
    build:
      context: services/dashboard
    container_name: obs-dashboard
    ports:
      - "3000:3000"
    depends_on:
      - query-api
    networks:
      - obs-network
    restart: unless-stopped

networks:
  obs-network:
    driver: bridge

volumes:
  kafka_data:
  timescale_data:
  redis_data:
